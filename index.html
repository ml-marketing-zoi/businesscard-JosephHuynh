<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joseph Huynh | Digital Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --zoi-dark-blue: #0A324E;
            --zoi-turquoise: #00A4B3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--zoi-dark-blue);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden; 
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--zoi-turquoise); 
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-weight: 800;
            text-transform: uppercase;
            font-size: 2rem;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            line-height: 1.2;
        }

        .job-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--zoi-turquoise);
            font-weight: 400;
            margin-bottom: 25px;
            display: block;
        }

        .info-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .email-link {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .save-contact-button {
            background-color: var(--zoi-turquoise);
            color: var(--zoi-dark-blue);
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            width: 180px;
            display: inline-block;
        }

        .save-contact-button:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .company-link {
            color: var(--zoi-turquoise);
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .footer-logo {
            margin-top: 60px;
            font-size: 0.7rem;
            opacity: 0.4;
